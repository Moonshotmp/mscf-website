[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  # zisi (default) preserves Netlify's blob env injection.
  # esbuild was stripping it in legacy v1 (exports.handler) functions.
  node_bundler = "zisi"

[[headers]]
  for = "/fob/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
